<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Вхід / Реєстрація — Cort</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px env(safe-area-inset-bottom, 20px);
    }

    /* ── Повернутися ── */
    .back-link {
      position: fixed;
      top: 20px; left: 20px;
      font-size: 0.88rem;
      font-weight: 500;
      color: #0071e3;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 10;
    }
    .back-link:hover { opacity: 0.75; }

    /* ── Логотип ── */
    .auth-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: #1d1d1f;
      margin-bottom: 28px;
      letter-spacing: -0.5px;
      text-align: center;
    }

    /* ── Card ── */
    .auth-card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    /* ── Tabs ── */
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid #e8e8ed;
    }
    .auth-tab {
      flex: 1;
      padding: 16px;
      font-size: 0.93rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      color: #86868b;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .auth-tab.active {
      color: #1d1d1f;
      border-bottom-color: #0071e3;
    }

    /* ── Form ── */
    .auth-form {
      padding: 28px 28px 32px;
      display: none;
    }
    .auth-form.active { display: block; }

    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #6e6e73;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 13px 15px;
      border-radius: 11px;
      border: 1.5px solid #d2d2d7;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      color: #1d1d1f;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }
    .form-group input:focus {
      border-color: #0071e3;
      background: #fff;
    }

    /* ── Submit button ── */
    .auth-btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border-radius: 11px;
      border: none;
      background: #1d1d1f;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      -webkit-appearance: none;
    }
    .auth-btn:hover { background: #3a3a3c; }
    .auth-btn:active { transform: scale(0.98); }
    .auth-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Status message ── */
    .auth-status {
      margin-top: 12px;
      font-size: 0.88rem;
      min-height: 1.2rem;
      font-weight: 500;
      text-align: center;
      line-height: 1.5;
    }

    /* ── Footer note ── */
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: #86868b;
    }
    .auth-footer a { color: #0071e3; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    @media (max-width: 420px) {
      .auth-logo { font-size: 1.7rem; margin-bottom: 22px; }
      .auth-form { padding: 22px 20px 26px; }
      .auth-tab { font-size: 0.88rem; padding: 14px 10px; }
    }
  </style>
</head>
<body>

<a href="index.html" class="back-link">&#8592; На головну</a>

<div class="auth-logo">Cort</div>

<div class="auth-card">

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Увійти</button>
    <button class="auth-tab"        id="tabReg"   onclick="switchTab('reg')">Зареєструватися</button>
  </div>

  <!-- Login form -->
  <div class="auth-form active" id="formLogin">
    <div class="form-group">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="Ваша@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="loginPassword">Пароль</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="auth-btn" id="loginBtn">Увійти</button>
    <p class="auth-status" id="loginStatus"></p>
  </div>

  <!-- Register form -->
  <div class="auth-form" id="formReg">
    <div class="form-group">
      <label for="regEmail">Email</label>
      <input type="email" id="regEmail" placeholder="Ваша@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="regPassword">Пароль</label>
      <input type="password" id="regPassword" placeholder="мінімум 6 символів" autocomplete="new-password">
    </div>
    <button class="auth-btn" id="registerBtn">Зареєструватися</button>
    <p class="auth-status" id="regStatus"></p>
  </div>

</div>

<p class="auth-footer">
  Реєструючись, ти погоджуєшся з <a href="terms.html">умовами використання</a>
</p>

<script type="module">
import { auth } from './js/firebase.js';
import {
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

function setStatus(el, msg, color) {
  el.textContent = msg;
  el.style.color = color;
}

// ── Вхід ──
document.getElementById("loginBtn").addEventListener("click", function() {
  var email    = document.getElementById("loginEmail").value.trim();
  var password = document.getElementById("loginPassword").value;
  var status   = document.getElementById("loginStatus");
  var btn      = document.getElementById("loginBtn");

  if (!email || !password) {
    setStatus(status, "Будь ласка, заповніть всі поля.", "#ff5a5f");
    return;
  }

  btn.disabled = true;
  setStatus(status, "Входимо...", "#86868b");

  signInWithEmailAndPassword(auth, email, password)
    .then(function() {
      setStatus(status, "Вхід успішний! Переходимо...", "#32d74b");
      setTimeout(function() { window.location.href = "index.html"; }, 800);
    })
    .catch(function(error) {
      btn.disabled = false;
      var msg = "Помилка входу.";
      if (error.code === "auth/user-not-found")    msg = "Акаунт не знайдено.";
      if (error.code === "auth/wrong-password")    msg = "Невірний пароль.";
      if (error.code === "auth/invalid-email")     msg = "Невірний формат email.";
      if (error.code === "auth/invalid-credential") msg = "Невірний email або пароль.";
      if (error.code === "auth/too-many-requests") msg = "Забагато спроб. Спробуйте пізніше.";
      setStatus(status, msg, "#ff5a5f");
    });
});

// ── Реєстрація ──
document.getElementById("registerBtn").addEventListener("click", function() {
  var email    = document.getElementById("regEmail").value.trim();
  var password = document.getElementById("regPassword").value;
  var status   = document.getElementById("regStatus");
  var btn      = document.getElementById("registerBtn");

  if (!email || !password) {
    setStatus(status, "Будь ласка, заповніть всі поля.", "#ff5a5f");
    return;
  }
  if (password.length < 6) {
    setStatus(status, "Пароль має бути не менше 6 символів.", "#ff5a5f");
    return;
  }

  btn.disabled = true;
  setStatus(status, "Реєструємо...", "#86868b");

  createUserWithEmailAndPassword(auth, email, password)
    .then(function() {
      setStatus(status, "Реєстрація успішна! Тепер увійдіть.", "#32d74b");
      btn.disabled = false;
      // Переключаємо на вкладку входу
      setTimeout(function() { switchTab('login'); }, 1200);
    })
    .catch(function(error) {
      btn.disabled = false;
      var msg = "Помилка реєстрації.";
      if (error.code === "auth/email-already-in-use") msg = "Цей email вже зареєстрований.";
      if (error.code === "auth/invalid-email")        msg = "Невірний формат email.";
      if (error.code === "auth/weak-password")        msg = "Пароль занадто простий.";
      setStatus(status, msg, "#ff5a5f");
    });
});

// ── Якщо вже залогінений — redirect ──
onAuthStateChanged(auth, function(user) {
  if (user) window.location.href = "index.html";
});
</script>

<script>
function switchTab(tab) {
  document.getElementById("formLogin").classList.toggle("active", tab === "login");
  document.getElementById("formReg").classList.toggle("active",   tab === "reg");
  document.getElementById("tabLogin").classList.toggle("active",  tab === "login");
  document.getElementById("tabReg").classList.toggle("active",    tab === "reg");
  document.getElementById("loginStatus").textContent = "";
  document.getElementById("regStatus").textContent   = "";
}
</script>

</body>
</html>
